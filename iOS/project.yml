name: Ticker
options:
  bundleIdPrefix: com.shimondeitel.ticker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ticker:
    type: application
    platform: iOS
    sources:
      - path: Ticker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ticker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TickerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TickerTests
      - path: Ticker.storekit
    dependencies:
      - target: Ticker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TickerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TickerUITests
    dependencies:
      - target: Ticker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ticker:
    build:
      targets:
        Ticker: all
        TickerTests: [test]
        TickerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ticker.storekit
    test:
      config: Debug
      storeKitConfiguration: Ticker.storekit
      targets:
        - TickerTests
        - TickerUITests
    archive:
      config: Release
